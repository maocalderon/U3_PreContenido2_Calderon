<!DOCTYPE html>
<html>
<head>
    <title>Margin Collapse</title>
    <style>
        .elemento { padding: 20px; }
        .elemento-1 { 
            background: #D5E8F0; 
            margin-bottom: 40px; /* Margen inferior [cite: 286] */
        }
        .elemento-2 { 
            background: #FFD700; 
            margin-top: 60px; /* Margen superior [cite: 284, 293] */
        }
    </style>
</head>
<body>
    <div class="elemento elemento-1">Elemento 1 (margin-bottom: 40px)</div>
    <div class="elemento elemento-2">Elemento 2 (margin-top: 60px)</div>
</body>
</html>
